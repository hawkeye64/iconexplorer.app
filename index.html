<!doctype html>
<html>
  <head>
    <title><%= productName %></title>

    <meta charset="utf-8" />
    <meta name="description" content="<%= productDescription %>" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />
    <meta
      name="viewport"
      content="user-scalable=no, initial-scale=1, maximum-scale=1, minimum-scale=1, width=device-width<% if (ctx.mode.cordova || ctx.mode.capacitor) { %>, viewport-fit=cover<% } %>"
    />

    <meta name="robots" content="index,follow" />
    <link rel="canonical" href="https://iconexplorer.app/" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Icon Explorer - searchable Quasar SVG icons" />
    <meta
      name="twitter:description"
      content="Icon Explorer helps browse, preview, compare, and copy Quasar-ready SVG icons from large icon catalogs."
    />
    <meta
      name="twitter:image"
      content="https://iconexplorer.app/iconexplorer-social-preview.png?v=20260619"
    />
    <meta name="twitter:image:alt" content="Icon Explorer searchable Quasar SVG icon catalog" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://iconexplorer.app/" />
    <meta property="og:site_name" content="Icon Explorer" />
    <meta property="og:title" content="Icon Explorer - searchable Quasar SVG icons" />
    <meta
      property="og:description"
      content="Icon Explorer helps browse, preview, compare, and copy Quasar-ready SVG icons from large icon catalogs."
    />
    <meta
      property="og:image"
      content="https://iconexplorer.app/iconexplorer-social-preview.png?v=20260619"
    />
    <meta
      property="og:image:secure_url"
      content="https://iconexplorer.app/iconexplorer-social-preview.png?v=20260619"
    />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1280" />
    <meta property="og:image:height" content="640" />
    <meta property="og:image:alt" content="Icon Explorer searchable Quasar SVG icon catalog" />

    <link rel="icon" type="image/png" sizes="128x128" href="icons/favicon-128x128.png" />
    <link rel="icon" type="image/png" sizes="96x96" href="icons/favicon-96x96.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16x16.png" />
    <link rel="icon" type="image/ico" href="favicon.ico" />
